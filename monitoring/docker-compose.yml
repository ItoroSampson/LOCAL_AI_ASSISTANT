services:
  # PROMETHEUS (The Brain)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # GRAFANA (The Face)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"

  # OPEN-WEBUI (The Interface - Optional but cool)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # OLLAMA-EXPORTER (The Metrics Fix)
  # Since community images are failing, we use the GitHub Container Registry version
  ollama-exporter:
    image: ghcr.io/maravexa/ollama-exporter:latest
    container_name: ollama-exporter
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
    ports:
      - "9400:9400" # Note: This exporter uses 9400